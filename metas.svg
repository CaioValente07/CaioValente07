  <text x="776" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#1D9E75">andamento</text>

  <!-- ── Row 2: PHP — 40% ── -->
  <rect x="50" y="162" width="760" height="46" rx="8" fill="#0d1117"/>
