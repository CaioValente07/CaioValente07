  <rect x="745" y="228" width="62" height="22" rx="11" fill="#1a2a1e" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="776" y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#1D9E75">andamento</text>

