  <text x="776" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#9b8fe8">andamento</text>

  <!-- ── Row 3: Figma — 60% ── -->
  <rect x="50" y="216" width="760" height="46" rx="8" fill="#161b22"/>
  <circle cx="72" cy="239" r="5" fill="#1D9E75"/>
  <text x="88" y="244" font-size="13" font-weight="500" fill="#e6edf3">Prototipação com Figma</text>
