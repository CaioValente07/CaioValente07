<svg width="860" height="300" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="860" height="300" rx="16" fill="#0d1117"/>

  <!-- Header -->
  <text x="50" y="44" font-size="15" font-weight="600" fill="#e6edf3">Atividade Recente</text>
  <text x="810" y="44" text-anchor="end" font-size="12" fill="#484f58">caioValente07 · 2025</text>
  <line x1="50" y1="56" x2="810" y2="56" stroke="#21262d" stroke-width="0.8"/>

  <!-- Métricas topo -->
  <rect x="50" y="68" width="140" height="52" rx="8" fill="#161b22"/>
  <text x="120" y="90" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="0.07em">TOTAL</text>
  <text x="120" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#00D4AA">10</text>

  <rect x="204" y="68" width="140" height="52" rx="8" fill="#161b22"/>
  <text x="274" y="90" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="0.07em">MELHOR MÊS</text>
  <text x="274" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">Mar</text>

  <rect x="358" y="68" width="140" height="52" rx="8" fill="#161b22"/>
  <text x="428" y="90" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="0.07em">SEQUÊNCIA</text>
  <text x="428" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">1 dia</text>

  <rect x="512" y="68" width="140" height="52" rx="8" fill="#161b22"/>
  <text x="582" y="90" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="0.07em">REPOSITÓRIOS</text>
  <text x="582" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">—</text>

  <rect x="666" y="68" width="144" height="52" rx="8" fill="#161b22"/>
  <text x="738" y="90" text-anchor="middle" font-size="10" fill="#484f58" letter-spacing="0.07em">LINGUAGEM</text>
  <text x="738" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#ED8B00">Java</text>

  <!-- ── GRÁFICO DE BARRAS MENSAL ── -->
  <!-- Eixo base -->
  <line x1="50" y1="240" x2="810" y2="240" stroke="#21262d" stroke-width="0.8"/>

  <!-- Labels meses -->
  <!-- 12 meses, largura disponível 760px, cada mês ~63px -->
  <!-- Commits por mês: Jan=0, Fev=1, Mar=3, Abr=2, Mai=1, Jun=0, Jul=1, Ago=2, Set=0, Out=0, Nov=0, Dez=0 -->
  <!-- max=3, altura disponível=90px (de y=150 a y=240) -->

  <!-- Defs para gradiente das barras -->
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
    <linearGradient id="barGradDim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9E75"/>
      <stop offset="100%" stop-color="#085041"/>
    </linearGradient>
    <!-- Área sob a linha -->
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Linhas de grade horizontais -->
  <line x1="50" y1="210" x2="810" y2="210" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="180" x2="810" y2="180" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="50" y1="150" x2="810" y2="150" stroke="#21262d" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="44" y="213" text-anchor="end" font-size="9" fill="#484f58">1</text>
  <text x="44" y="183" text-anchor="end" font-size="9" fill="#484f58">2</text>
  <text x="44" y="153" text-anchor="end" font-size="9" fill="#484f58">3</text>

  <!-- Área preenchida sob a curva -->
  <!-- Pontos: Jan(79,240) Fev(142,210) Mar(205,150) Abr(268,180) Mai(331,210) Jun(394,240) Jul(457,210) Ago(520,180) Set(583,240) Out(646,240) Nov(709,240) Dez(772,240) -->
  <polygon
    points="79,240 142,210 205,150 268,180 331,210 394,240 457,210 520,180 583,240 646,240 709,240 772,240 772,240 50,240"
    fill="url(#areaGrad)"/>

  <!-- Linha de tendência -->
  <polyline
    points="79,240 142,210 205,150 268,180 331,210 394,240 457,210 520,180 583,240 646,240 709,240 772,240"
    fill="none" stroke="#00D4AA" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Pontos sobre a linha -->
  <!-- Jan: 0 commits -->
  <circle cx="79"  cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <!-- Fev: 1 commit -->
  <circle cx="142" cy="210" r="4" fill="#00D4AA"/>
  <!-- Mar: 3 commits -->
  <circle cx="205" cy="150" r="5" fill="#00D4AA" stroke="#0d1117" stroke-width="1.5"/>
  <!-- Abr: 2 commits -->
  <circle cx="268" cy="180" r="4" fill="#00D4AA"/>
  <!-- Mai: 1 commit -->
  <circle cx="331" cy="210" r="4" fill="#00D4AA"/>
  <!-- Jun: 0 commits -->
  <circle cx="394" cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <!-- Jul: 1 commit -->
  <circle cx="457" cy="210" r="4" fill="#1D9E75"/>
  <!-- Ago: 2 commits -->
  <circle cx="520" cy="180" r="4" fill="#1D9E75"/>
  <!-- Set: 0 commits -->
  <circle cx="583" cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <!-- Out: 0 commits -->
  <circle cx="646" cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <!-- Nov: 0 commits -->
  <circle cx="709" cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <!-- Dez: 0 commits -->
  <circle cx="772" cy="240" r="3" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>

  <!-- Tooltip Mar (pico) -->
  <rect x="178" y="126" width="56" height="20" rx="5" fill="#00D4AA"/>
  <text x="206" y="140" text-anchor="middle" font-size="10" font-weight="600" fill="#0d1117">3 commits</text>
  <polygon points="202,146 210,146 206,152" fill="#00D4AA"/>

  <!-- Labels meses -->
  <text x="79"  y="258" text-anchor="middle" font-size="10" fill="#484f58">Jan</text>
  <text x="142" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Fev</text>
  <text x="205" y="258" text-anchor="middle" font-size="10" fill="#00D4AA" font-weight="600">Mar</text>
  <text x="268" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Abr</text>
  <text x="331" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Mai</text>
  <text x="394" y="258" text-anchor="middle" font-size="10" fill="#484f58">Jun</text>
  <text x="457" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Jul</text>
  <text x="520" y="258" text-anchor="middle" font-size="10" fill="#8b949e">Ago</text>
  <text x="583" y="258" text-anchor="middle" font-size="10" fill="#484f58">Set</text>
  <text x="646" y="258" text-anchor="middle" font-size="10" fill="#484f58">Out</text>
  <text x="709" y="258" text-anchor="middle" font-size="10" fill="#484f58">Nov</text>
  <text x="772" y="258" text-anchor="middle" font-size="10" fill="#484f58">Dez</text>

  <!-- Legenda -->
  <circle cx="56" cy="282" r="4" fill="#00D4AA"/>
  <text x="66" y="286" font-size="10" fill="#8b949e">Contribuições</text>
  <circle cx="164" cy="282" r="4" fill="#21262d" stroke="#484f58" stroke-width="1.5"/>
  <text x="174" y="286" font-size="10" fill="#484f58">Sem atividade</text>

</svg>
